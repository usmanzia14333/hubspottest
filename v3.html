<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<div id="hubspot-form"></div>

<!-- Google Places API -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

<!-- HubSpot Forms v3 Embed -->
<script 
  src="https://js.hsforms.net/forms/embed/v3.js"
  defer
></script>

<script>
  // Wait until HubSpot form is rendered
  window.addEventListener('message', function(event) {
    if (event.data.type === 'hsFormCallback' && event.data.eventName === 'onFormReady') {
      
      console.log('Form loaded (v3)');

      const form = document.querySelector('#hubspot-form form');

      if (!form) return;

      // Apply red border to all fields
      const fields = form.querySelectorAll('input, textarea, select');

      fields.forEach(field => {
        field.style.border = '2px solid red';
        field.style.borderRadius = '4px';
      });

      // Retry until firstname field exists
      let tries = 0;

      const interval = setInterval(() => {
        const input = form.querySelector('input[name="firstname"]');

        if (input) {
          clearInterval(interval);
          console.log("Field found");

          const autocomplete = new google.maps.places.Autocomplete(input, {
            types: ['geocode']
          });

          // ✅ FIXED country code
          autocomplete.setComponentRestrictions({
            country: "us" // or "pk"
          });

          autocomplete.addListener('place_changed', function () {
            const place = autocomplete.getPlace();
            input.value = place.formatted_address || '';
          });

        } else {
          tries++;
          if (tries > 10) {
            clearInterval(interval);
            console.log("Field not found after retries");
          }
        }
      }, 300);
    }
  });
</script>

<!-- HubSpot Form Container -->
<div 
  class="hs-form-frame"
  data-region="na2"
  data-form-id="e6f8d243-a3e2-454e-bb8c-8035578a00b5"
  data-portal-id="245775901"
  id="hubspot-form"
></div>

</body>
</html>
