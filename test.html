<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<div id="hubspot-form"></div>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_3zlUad8GWJrtxQgfhfUQm_d4A3jhfgM&libraries=places"></script>
<script charset="utf-8" type="text/javascript" src="//js-na2.hsforms.net/forms/embed/v2.js"></script>
<script>
  hbspt.forms.create({
    portalId: "245775901",
    formId: "e6f8d243-a3e2-454e-bb8c-8035578a00b5",
    region: "na2",
    target: "#hubspot-form",

    onFormReady: function (form) {
        console.log('Form loaded');

        // Wait for HubSpot to fully render the DOM
        setTimeout(() => {

            const input = document.getElementById('firstname-e6f8d243-a3e2-454e-bb8c-8035578a00b5');

            if (!input) {
                console.log("Field not found");
                return;
            }

            // Initialize autocomplete on THIS field
            const autocomplete = new google.maps.places.Autocomplete(input, {
                types: ['geocode'] // or ['(cities)']
            });

            // Optional: restrict to usa
            autocomplete.setComponentRestrictions({
                country: "usa"
            });

            autocomplete.addListener('place_changed', function () {
                const place = autocomplete.getPlace();
                console.log('Selected place:', place.formatted_address);

                // Force value update (sometimes needed)
                input.value = place.formatted_address;
            });

        }, 800); // slight delay helps with HubSpot rendering
    }
  });
</script>

</body>
</html>
