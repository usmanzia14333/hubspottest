<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<div id="hubspot-form"></div>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_3zlUad8GWJrtxQgfhfUQm_d4A3jhfgM&libraries=places"></script>
<script charset="utf-8" type="text/javascript" src="//js-na2.hsforms.net/forms/embed/v2.js"></script>
<script>
  hbspt.forms.create({
    portalId: "245775901",
    formId: "e6f8d243-a3e2-454e-bb8c-8035578a00b5",
    region: "na2",
    target: "#hubspot-form",

    onFormReady: function (form) {
    console.log('Form loaded');

    // Apply red border to all fields
    const fields = form.querySelectorAll('input, textarea, select');

    fields.forEach(field => {
        field.style.border = '2px solid red';
        field.style.borderRadius = '4px'; // optional (looks nicer)
    });

    // Existing autocomplete code...
    let tries = 0;

    const interval = setInterval(() => {
        const input = form.querySelector('input[name="firstname"]');

        if (input) {
            clearInterval(interval);
            console.log("Field found");

            const autocomplete = new google.maps.places.Autocomplete(input, {
                types: ['geocode']
            });

            autocomplete.setComponentRestrictions({
                country: "usa"
            });

            autocomplete.addListener('place_changed', function () {
                const place = autocomplete.getPlace();
                input.value = place.formatted_address || '';
            });

        } else {
            tries++;
            if (tries > 10) {
                clearInterval(interval);
                console.log("Field not found after retries");
            }
        }
    }, 300);
}
  });
</script>

</body>
</html>
