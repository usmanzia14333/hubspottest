<!-- 1. Load the HubSpot script WITHOUT "defer" so the hbspt variable is ready immediately -->
<script charset="utf-8" type="text/javascript" src="https://hsforms.net"></script>

<!-- 2. Define where the form should appear -->
<div id="my-custom-form-container"></div>

<!-- 3. Create the form and inject CSS -->
<script>
  hbspt.forms.create({
    region: "na2",
    portalId: "245775901",
    formId: "adf6daa9-5713-4815-851e-b503caa30190",
    target: "#my-custom-form-container", // Tells HubSpot where to put the form
    onFormReady: function($form) {
      // Access the document inside the iframe
      var iframeDoc = $form[0].ownerDocument;
      var head = iframeDoc.head || iframeDoc.getElementsByTagName('head')[0];
      var style = iframeDoc.createElement('style');

      // YOUR CUSTOM CSS GOES HERE
      var css = `
        .hs-button { background: #ff0000 !important; border: none !important; }
        .hs-form-field label { color: blue !important; }
        input[type="text"] { border-radius: 10px !important; }
      `;

      style.type = 'text/css';
      if (style.styleSheet) {
        style.styleSheet.cssText = css;
      } else {
        style.appendChild(iframeDoc.createTextNode(css));
      }
      head.appendChild(style);
    }
  });
</script>
