<!-- 1. Use the GLOBAL v2.js script (required for custom JS callbacks) -->
<!-- REMOVE your old .../245775901.js script -->
<script charset="utf-8" type="text/javascript" src="https://js-na2.hsforms.net/forms/embed/v2.js"></script>

<!-- 2. The container where your form will load -->
<div id="hubspot-form-container"></div>

<!-- 3. The script to load the form and inject your CSS -->
<script>
  // Ensure the HubSpot library is fully loaded before running
  window.onload = function() {
    if (typeof hbspt !== 'undefined') {
      hbspt.forms.create({
        region: "na2",
        portalId: "245775901",
        formId: "adf6daa9-5713-4815-851e-b503caa30190",
        target: "#hubspot-form-container",
        onFormReady: function($form) {
          // Reach inside the iframe document
          var iframeDoc = $form[0].ownerDocument; 
          var style = iframeDoc.createElement('style');
          
          // ADD YOUR CSS HERE
          style.innerHTML = `
            .hs-button { background-color: #ff0000 !important; border-radius: 4px !important; }
            .hs-form-field label { color: #333 !important; font-weight: 600 !important; }
            input[type="text"], input[type="email"] { color: #ff0000 !important; }
          `;
          
          iframeDoc.head.appendChild(style);
        }
      });
    } else {
      console.error("HubSpot script (v2.js) failed to load.");
    }
  };
</script>
