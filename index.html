<!-- 1. Use the STABLE global script (No Portal ID in the filename) -->
<script charset="utf-8" type="text/javascript" src="https://hsforms.net"></script>

<!-- 2. Target container -->
<div id="form-target-container"></div>

<!-- 3. Bulletproof Injector -->
<script>
  function injectHubSpot() {
    // Check if the hbspt library is finally loaded
    if (typeof hbspt !== 'undefined') {
      hbspt.forms.create({
        region: "na2",
        portalId: "245775901",
        formId: "adf6daa9-5713-4815-851e-b503caa30190",
        target: "#form-target-container",
        onFormReady: function($form) {
          // Reach inside the iframe document
          const iframeDoc = $form.ownerDocument;
          const style = iframeDoc.createElement('style');
          
          // ADD YOUR CSS HERE - Use !important to override HubSpot defaults
          style.innerHTML = `
            .hs-button { background: #ff0000 !important; border: none !important; color: #fff !important; }
            .hs-form-field label { color: blue !important; font-weight: bold !important; }
            input.hs-input { border: 1px solid #333 !important; border-radius: 4px !important; }
          `;
          
          iframeDoc.head.appendChild(style);
          console.log("CSS injected successfully.");
        }
      });
    } else {
      // If not ready, wait 100ms and try again
      setTimeout(injectHubSpot, 100);
    }
  }
  
  // Start the check
  injectHubSpot();
</script>
