<!DOCTYPE html>
<html>
<head>
    <!-- 1. Use ONLY this global script -->
    <script charset="utf-8" type="text/javascript" src="https://js.hsforms.net/forms/v2.js"></script>
</head>
        <div id="hubspot-form-target"></div>

    <script>
      function loadHubSpotForm() {
        if (window.hbspt) {
          // Clear the target first to prevent double-loading
          document.getElementById('hubspot-form-target').innerHTML = '';
          
          hbspt.forms.create({
            region: "na2",
            portalId: "245775901",
            formId: "adf6daa9-5713-4815-851e-b503caa30190",
            target: "#hubspot-form-target",
            onFormReady: function($form) {
              // Get the iframe document
              var iframeDoc = $form.ownerDocument;
              var styleTag = iframeDoc.createElement('style');
              
              styleTag.innerHTML = `
                /* This targets the button inside the iframe */
                .hs-button { 
                   background: #ff0000 !important; 
                   border-radius: 0px !important; 
                }
                /* This targets labels inside the iframe */
                .hs-form-field label { 
                   color: blue !important; 
                }
              `;
              
              iframeDoc.head.appendChild(styleTag);
              console.log("CSS injected successfully.");
            }
          });
        } else {
          setTimeout(loadHubSpotForm, 100);
        }
      }
      loadHubSpotForm();
    </script>
<body>

    <!-- 2. Keep this DIV empty. Do NOT put other scripts inside it. -->

</body>
</html>
