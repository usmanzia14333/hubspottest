<script>
  var formLoaded = false;

  var checkForm = setInterval(function() {
    var iframe = document.querySelector('.hs-form-frame iframe');

    if (iframe) {
      // Make sure iframe is fully loaded, not just inserted into DOM
      if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
        if (!formLoaded) {
          formLoaded = true;          // prevent alert from firing twice
          clearInterval(checkForm);

          console.log('HubSpot V3 form fully loaded!');
          alert('Form has been loaded!');

          // ✅ Do your custom DOM changes here
          // Example: access form elements inside iframe
          // var innerForm = iframe.contentDocument.querySelector('form');
          // var inputs = iframe.contentDocument.querySelectorAll('input');

         
var doc = iframe.contentDocument;

// Check if doc is accessible
console.log('doc:', doc);
console.log('readyState:', doc.readyState);

// Check if form exists
console.log('form:', doc.querySelector('form'));

// Log ALL inputs
var inputs = doc.getElementsByTagName('input');
console.log('Total inputs found:', inputs.length);
for (var i = 0; i < inputs.length; i++) {
  console.log('Input:', inputs[i].name, inputs[i]);
}
        }
      }
    }
  }, 300);

  // Safety: stop polling after 15 seconds to avoid infinite loop
  setTimeout(function() {
    clearInterval(checkForm);
  }, 15000);
</script>
