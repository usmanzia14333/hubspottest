  hbspt.forms.create({

    style.innerHTML = `
    .hs-button { background-color: #ff0000 !important; border-radius: 5px; }
      .hs-form-field label { color: blue; font-weight: bold; }
      /* END CUSTOM CSS */
      /* PASTE YOUR CUSTOM CSS BELOW */

    iframeDoc.head.appendChild(style);
  }
});
</script>
