<script charset="utf-8" type="text/javascript" src="https://hsforms.net"></script>

<div id="hubspot-form-target"></div>

<script>
  hbspt.forms.create({
    region: "na2",
    portalId: "245775901",
    formId: "adf6daa9-5713-4815-851e-b503caa30190",
    target: "#hubspot-form-target",
    onFormReady: function($form) {
      // 1. Give the iframe a millisecond to finish internal rendering
      setTimeout(function() {
        var iframeDoc = $form[0].ownerDocument;
        var styleTag = iframeDoc.createElement('style');
        
        // 2. Use !important on everything to fight HubSpot's default CSS
        styleTag.innerHTML = `
          body { background: transparent !important; }
          .hs-button { 
            background: #ff0000 !important; 
            border: none !important; 
            padding: 20px !important; 
          }
          .hs-form-field label { 
            color: blue !important; 
            font-size: 18px !important; 
          }
          input.hs-input { 
            border: 2px solid red !important; 
            border-radius: 0px !important; 
          }
        `;
        
        iframeDoc.head.appendChild(styleTag);
        console.log("CSS Injected into Iframe");
      }, 100); 
    }
  });
</script>
