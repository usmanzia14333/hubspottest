<!-- 1. Use the STABLE global script -->
<script charset="utf-8" type="text/javascript" src="https://js.hsforms.net/forms/v2.js"></script>

<!-- 2. Target container -->
<div id="form-target"></div>

<!-- 3. Bulletproof Loader -->
<script>
  function loadForm() {
    if (typeof hbspt !== 'undefined') {
      hbspt.forms.create({
        region: "na2",
        portalId: "245775901",
        formId: "adf6daa9-5713-4815-851e-b503caa30190",
        target: "#form-target",
        onFormReady: function($form) {
          // Inject styles directly into the iframe head
          const doc = $form.ownerDocument;
          const style = doc.createElement('style');
          style.innerHTML = `
            .hs-button { background: #ff0000 !important; border: none !important; }
            .hs-form-field label { color: blue !important; }
            input.hs-input { border: 2px solid #ccc !important; }
          `;
          doc.head.appendChild(style);
        }
      });
    } else {
      setTimeout(loadForm, 100);
    }
  }
  loadForm();
</script>
