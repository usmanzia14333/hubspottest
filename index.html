<!-- HubSpot V3 Embed -->
<script src="https://js-na2.hsforms.net/forms/embed/3277480.js" defer></script>

<div 
  class="hs-form-frame" 
  data-region="na2" 
  data-form-id="f66c7df7-5532-4822-bb5d-34b76d6ee51f" 
  data-portal-id="3277480">
</div>

<script>
  window.addEventListener('message', function(event) {
    // Make sure the message is from HubSpot
    if (
      event.origin.includes('hsforms.com') || 
      event.origin.includes('hsforms.net')
    ) {
      if (
        event.data && 
        event.data.type === 'hsFormCallback' && 
        event.data.eventName === 'onFormReady'
      ) {
        console.log('HubSpot V3 form is ready!');
        alert('Form has been loaded!');
      }
    }
  });
</script>
